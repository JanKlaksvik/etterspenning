<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etterspenning.no – Bilder</title>
  <link rel="stylesheet" href="styles.css">
  <script src="site.js" defer></script>
<style>
  section {
    padding: 20px 10px;
    max-width: 800px;
    margin: auto;
    background-color: white;
  }

  .layout-container {
    max-width: min(1000px, 100%);
    margin: 0 auto;
    padding: 0 10px;
  }

  .image-grid {
    display: flex;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 10px;
    overflow-x: auto;
    margin-top: 20px;
  }

  .image-grid img {
    flex: 0 0 23%;
    max-height: 200px;
    object-fit: cover;
    border: 2px solid #ccc;
    border-radius: 8px;
    cursor: zoom-in;
    transition: transform 0.3s ease;
    max-width: 100%;
  }

  .image-grid img:hover {
    transform: scale(1.05);
  }

  .rotate {
    transform: rotate(-90deg);
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0, 0, 0, 0.8);
  }

  .modal-content {
    display: block;
    margin: 5% auto;
    max-width: 90%;
    border-radius: 8px;
  }

  .modal img {
    width: auto;
    max-width: 100%;
    height: auto;
    display: block;
  }

  .close {
    position: absolute;
    top: 20px;
    right: 30px;
    color: #fff;
    font-size: 30px;
    font-weight: bold;
    cursor: pointer;
  }

  h2 {
    margin-top: 0;
  }
</style>
</head>
<body>
  <header class="site-header">
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span class="visually-hidden">Meny</span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
    <div class="site-title">Etterspenning.no</div>
  </header>
  <nav id="site-nav" class="site-nav" aria-label="Hovedmeny">
    <a href="index.html">Hjem</a>
    <a href="forankringer.html">Forankringer</a>
    <a href="verktoy.html">Verktøy</a>
    <a href="software.html">Software</a>
    <a href="data.html">Data</a>
    <a class="active" href="bilder.html">Bilder</a>
    <a href="kontakt.html">Kontakt</a>
  </nav>

  <section>
    <div class="layout-container">
      <h2>Carlberg tunnelen</h2>
      <p>permanente lineforankringer, godkjennelse test i h.t. test metode 1 og egenhets test begge i h.t. Test metode 1 (NS EN ISO 22477-5:2018).</p>
      <div class="image-grid">
        <img src="bilde1.JPG" alt="Bilde 1 – Carlberg forankring" onclick="openModal(this)">
        <img src="bilde2.jpg" alt="Bilde 2 – Carlberg test" onclick="openModal(this)">
        <img src="bilde3.jpg" alt="Bilde 3 – Carlberg detalj" class="rotate" onclick="openModal(this, true)">
        <img src="bilde4.jpg" alt="Bilde 4 – Carlberg teststrekning" class="rotate" onclick="openModal(this, true)">
      </div>
    </div>
  </section>

  <div id="imageModal" class="modal" onclick="closeModal()" role="dialog" aria-modal="true">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImage">
  </div>

  <footer>
    &copy; 2025 Etterspenning.no
  </footer>

  <script>
    function openModal(imgElement, isRotated = false) {
      const modal = document.getElementById("imageModal");
      const modalImg = document.getElementById("modalImage");

      modal.style.display = "block";
      modalImg.src = imgElement.src;
      modalImg.style.transform = isRotated ? "rotate(-90deg)" : "none";
    }

    function closeModal() {
      document.getElementById("imageModal").style.display = "none";
    }
  </script>
</body>
</html>
