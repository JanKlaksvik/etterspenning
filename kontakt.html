<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etterspenning.no - Kontakt</title>
  <link rel="stylesheet" href="styles.css">
  <script src="site.js" defer></script>
  <style>
    section {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      background-color: white;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input, textarea, button {
      padding: 10px;
      font-size: 1rem;
    }
    button {
      background-color: #005599;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #004080;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span class="visually-hidden">Meny</span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
    <div class="site-title">Etterspenning.no</div>
  </header>
  <nav id="site-nav" class="site-nav" aria-label="Hovedmeny">
    <a href="index.html">Hjem</a>
    <a href="forankringer.html">Forankringer</a>
    <a href="verktoy.html">Verktøy</a>
    <a href="software.html">Software</a>
    <a href="data.html">Data</a>
    <a href="bilder.html">Bilder</a>
    <a class="active" href="kontakt.html">Kontakt</a>
  </nav>

  <section>
    <h1>Kontakt</h1>
    <p>Fyll ut skjemaet under så tar vi kontakt med deg så snart som mulig.</p>
    <form>
      <label for="navn">Navn:</label>
      <input type="text" id="navn" name="navn" required>

      <label for="epost">E-post:</label>
      <input type="email" id="epost" name="epost" required>

      <label for="melding">Melding:</label>
      <textarea id="melding" name="melding" rows="5" required></textarea>

      <button type="submit">Send</button>
    </form>
  </section>

  <footer>
    &copy; 2025 Etterspenning.no
  </footer>
</body>
</html>
